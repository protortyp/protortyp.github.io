{%- comment -%}
  Shared CSS + JS for `hn-discussion.html`. Include once per page (from
  `_layouts/post.html`); markup-only `hn-discussion.html` can be included
  any number of times above that.
{%- endcomment -%}
<style>
  /* `!important` defeats chirpy's `.content a:not(.img-link)` border-bottom
     and `%link-hover` color overrides that otherwise eat the orange edge. */

  /* ---- Card variant (full-width orange-bordered box) ------------------ */
  .hn-discussion,
  .content a.hn-discussion {
    display: flex;
    width: 100%;
    margin: 2rem 0;
    padding: 0.85rem 1.1rem;
    background: transparent;
    border: 1px solid #ff6600 !important;
    border-radius: 8px;
    font-size: 0.95rem;
    text-decoration: none;
    color: inherit !important;
    transition: background 0.2s ease;
  }
  .hn-discussion:hover,
  .content a.hn-discussion:hover {
    background: rgba(255, 102, 0, 0.06);
    border-color: #ff6600 !important;
    color: inherit !important;
    text-decoration: none;
  }
  .hn-discussion-content {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    width: 100%;
  }
  .hn-icon { flex-shrink: 0; }
  .hn-link { font-weight: 500; }
  .hn-stats {
    margin-left: auto;
    opacity: 0.65;
    font-size: 0.9rem;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .hn-stats[hidden] { display: none; }
  .hn-separator { margin: 0 0.5rem; }
  .hn-points::before { content: '↑ '; }
  .hn-points::after { content: ' points'; }
  .hn-comments::after { content: ' comments'; }

  @media (max-width: 640px) {
    .hn-discussion {
      margin: 1rem 0 1.5rem;
      padding: 0.75rem 0.9rem;
      font-size: 0.9rem;
    }
    .hn-discussion-content { flex-wrap: wrap; }
    .hn-stats {
      flex-basis: 100%;
      margin-left: 1.6rem;
      margin-top: 0.4rem;
      font-size: 0.85rem;
    }
  }

  /* ---- Mini variant (inline icon + stats, no border) ------------------ */
  .hn-discussion--mini,
  .content a.hn-discussion--mini {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    width: auto;
    margin: 0;
    padding: 0;
    background: transparent;
    border: none !important;
    border-radius: 0;
    font-size: inherit;
    line-height: 1.5;
    text-decoration: none;
    color: inherit !important;
    transition: color 0.2s ease;
  }
  .hn-discussion--mini:hover,
  .content a.hn-discussion--mini:hover {
    background: transparent;
    color: #ff6600 !important;
    border: none !important;
    text-decoration: none;
  }
  .hn-mini-icon { flex-shrink: 0; }
  .hn-mini-stats {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-variant-numeric: tabular-nums;
    opacity: 0.75;
  }
  .hn-mini-stats[hidden] { display: none; }
  .hn-mini-sep { opacity: 0.5; }
  .hn-mini-points::before { content: '↑'; margin-right: 0.15em; }
  .hn-mini-comments::after { content: '\00A0💬'; }

  /* Chirpy injects '•' before any `span + span` inside `.post-meta`.
     Suppress that inside the mini so we keep just our own separator. */
  .hn-discussion--mini span + span::before,
  .post-meta .hn-discussion--mini span + span::before {
    content: none !important;
    padding: 0 !important;
  }

  /* 2-column meta grid used when `hn:` is set: keeps line-heights in sync
     so Posted/HN-mini and By/read-time line up across columns. */
  .post-meta-grid > .post-meta-col > div {
    line-height: 1.6;
  }
  .post-meta-grid {
    gap: 1rem;
  }

  /* Auto-discovery: hide the box until Algolia resolves a submission.
     `visibility: hidden` preserves layout so nothing shifts on resolve. */
  .hn-discussion--pending { visibility: hidden; }
</style>

<script>
  (function () {
    function populate(el, score, comments) {
      var stats = el.querySelector('[data-hn-stats]');
      var pts = el.querySelector('[data-hn-points]');
      var cmt = el.querySelector('[data-hn-comments]');
      if (pts && typeof score === 'number') pts.textContent = score;
      if (cmt && typeof comments === 'number') cmt.textContent = comments;
      if (stats && (typeof score === 'number' || typeof comments === 'number')) {
        stats.hidden = false;
      }
    }

    /* Phase 1: resolve `data-hn-auto` URLs to ids via the HN Algolia API.
       One Algolia request per unique URL; multiple boxes share the result. */
    function resolveAuto() {
      var autoBoxes = document.querySelectorAll('.hn-discussion[data-hn-auto]');
      var byUrl = {};
      autoBoxes.forEach(function (el) {
        var url = el.getAttribute('data-hn-auto');
        (byUrl[url] = byUrl[url] || []).push(el);
      });
      var urls = Object.keys(byUrl);
      if (!urls.length) return Promise.resolve();
      return Promise.all(urls.map(function (url) {
        var qs = 'query=' + encodeURIComponent(url)
               + '&restrictSearchableAttributes=url'
               + '&tags=story';
        return fetch('https://hn.algolia.com/api/v1/search?' + qs)
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (data) {
            if (!data || !data.hits || !data.hits.length) return;
            var top = data.hits.reduce(function (best, h) {
              return (h.points || 0) > (best.points || 0) ? h : best;
            });
            byUrl[url].forEach(function (el) {
              el.setAttribute('data-hn-id', top.objectID);
              el.removeAttribute('data-hn-auto');
              el.href = 'https://news.ycombinator.com/item?id=' + top.objectID;
              el.classList.remove('hn-discussion--pending');
              populate(el, top.points, top.num_comments);
            });
          })
          .catch(function () { /* silent: pending boxes stay hidden */ });
      }));
    }

    /* Phase 2: fetch live counts from Firebase per resolved id. */
    function fetchLiveCounts() {
      var boxes = document.querySelectorAll('.hn-discussion[data-hn-id]');
      var byId = {};
      boxes.forEach(function (el) {
        var id = el.getAttribute('data-hn-id');
        if (!id) return;
        (byId[id] = byId[id] || []).push(el);
      });
      Object.keys(byId).forEach(function (id) {
        fetch('https://hacker-news.firebaseio.com/v0/item/' + encodeURIComponent(id) + '.json')
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (d) {
            if (!d) return;
            byId[id].forEach(function (el) { populate(el, d.score, d.descendants); });
          })
          .catch(function () { /* silent */ });
      });
    }

    function init() {
      if (!document.querySelector('.hn-discussion')) return;
      resolveAuto().then(fetchLiveCounts);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
