{% raw %}
<style>
  .chart-industry {
    margin: 1.5rem 0;
    color: var(--text-color, currentColor);
  }
  .chart-industry svg {
    max-width: 100%;
    height: auto;
    background: transparent;
  }
  .chart-industry .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem 1.1rem;
    margin: 0.25rem 0 0.6rem;
    font-size: 0.8rem;
    opacity: 0.85;
  }
  .chart-industry .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .chart-industry .legend-swatch {
    width: 18px;
    height: 3px;
    border-radius: 2px;
  }
  .chart-industry .caption {
    font-size: 0.8rem;
    opacity: 0.6;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
</style>

<div class="chart-industry">
  <div class="legend">
    <div class="legend-item">
      <span class="legend-swatch" style="background:#d97b66"></span>
      <span>Energy-intensive industries</span>
    </div>
    <div class="legend-item">
      <span class="legend-swatch" style="background:#6c7a89"></span>
      <span>All industry</span>
    </div>
  </div>

  <div id="chart-industry"></div>
</div>

<script type="module">
  const Plot = await import("https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.17/+esm");

  const energyIntensive = [
    { year: 2018, index: 104.0 },
    { year: 2019, index: 103.0 },
    { year: 2020, index:  97.0 },
    { year: 2021, index: 100.0 },
    { year: 2022, index:  94.3 },
    { year: 2023, index:  83.7 },
    { year: 2024, index:  84.2 },
    { year: 2025, index:  82.1 }
  ];

  const allIndustry = [
    { year: 2018, index: 102.0 },
    { year: 2019, index: 100.5 },
    { year: 2020, index:  91.0 },
    { year: 2021, index: 100.0 },
    { year: 2022, index:  96.5 },
    { year: 2023, index:  94.6 },
    { year: 2024, index:  93.0 },
    { year: 2025, index:  92.0 }
  ];

  function render() {
    const isNarrow = window.innerWidth < 600;
    const chart = Plot.plot({
      marginLeft: 50,
      marginRight: isNarrow ? 30 : 80,
      marginTop: 32,
      marginBottom: 36,
      height: 300,
      style: {
        background: "transparent",
        color: "currentColor",
        fontFamily: "inherit",
        fontSize: isNarrow ? "11px" : "13px"
      },
      x: {
        label: null,
        tickFormat: d => String(d)
      },
      y: {
        label: "index (2021 = 100)",
        labelAnchor: "top",
        grid: true,
        domain: [75, 108]
      },
      marks: [
        Plot.ruleY([100], { stroke: "currentColor", strokeOpacity: 0.25, strokeDasharray: "3 4" }),

        Plot.lineY(allIndustry, {
          x: "year",
          y: "index",
          stroke: "#6c7a89",
          strokeWidth: 2,
          curve: "monotone-x"
        }),
        Plot.dot(allIndustry, {
          x: "year",
          y: "index",
          fill: "#6c7a89",
          r: 3
        }),

        Plot.lineY(energyIntensive, {
          x: "year",
          y: "index",
          stroke: "#d97b66",
          strokeWidth: 2.5,
          curve: "monotone-x"
        }),
        Plot.dot(energyIntensive, {
          x: "year",
          y: "index",
          fill: "#d97b66",
          r: 3.5
        }),
        Plot.text([energyIntensive[energyIntensive.length - 1]], {
          x: "year",
          y: "index",
          text: d => d.index.toFixed(1),
          dy: 14,
          fill: "#d97b66",
          fillOpacity: 0.95,
          fontWeight: 600,
          fontSize: isNarrow ? 10 : 11
        })
      ]
    });

    const container = document.getElementById("chart-industry");
    container.innerHTML = "";
    container.append(chart);
  }

  render();
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 150);
  });
</script>
{% endraw %}
