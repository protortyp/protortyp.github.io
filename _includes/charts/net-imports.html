{% raw %}
<style>
  .chart-net-imports {
    margin: 1.5rem 0;
    color: var(--text-color, currentColor);
  }
  .chart-net-imports svg {
    max-width: 100%;
    height: auto;
    background: transparent;
  }
  .chart-net-imports .caption {
    font-size: 0.8rem;
    opacity: 0.6;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
</style>

<div class="chart-net-imports">
  <div id="chart-net-imports"></div>
</div>

<script type="module">
  const Plot = await import("https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.17/+esm");

  const data = [
    { year: 2000, net:   1 },
    { year: 2002, net:   0 },
    { year: 2003, net:   8 },
    { year: 2005, net:  12 },
    { year: 2008, net:  23 },
    { year: 2010, net:  17 },
    { year: 2013, net:  33 },
    { year: 2015, net:  51 },
    { year: 2017, net:  52 },
    { year: 2019, net:  33 },
    { year: 2020, net:  18 },
    { year: 2021, net:  17 },
    { year: 2022, net:  27 },
    { year: 2023, net:  -9.2 },
    { year: 2024, net: -24.9 }
  ];

  function render() {
    const isNarrow = window.innerWidth < 600;
    const chart = Plot.plot({
      marginLeft: 50,
      marginRight: 30,
      marginTop: 32,
      marginBottom: 36,
      height: 340,
      style: {
        background: "transparent",
        color: "currentColor",
        fontFamily: "inherit",
        fontSize: isNarrow ? "11px" : "13px"
      },
      x: {
        label: null,
        tickFormat: d => String(d)
      },
      y: {
        label: "net TWh exported",
        labelAnchor: "top",
        grid: true,
        domain: [-55, 85],
        ticks: [-40, -20, 0, 20, 40, 60, 80]
      },
      marks: [
        Plot.rectY(data, {
          x1: d => d.year - 0.42,
          x2: d => d.year + 0.42,
          y: "net",
          fill: d => d.net >= 0 ? "#6c7a89" : "#d97b66"
        }),
        Plot.text(data.filter(d => d.year === 2024 || d.year === 2017), {
          x: "year",
          y: "net",
          text: d => d.year === 2024 ? `${d.net.toFixed(1)}` : `+${d.net}`,
          dy: d => d.net >= 0 ? -28 : 28,
          fill: "currentColor",
          fillOpacity: 0.9,
          fontWeight: 600,
          fontVariantNumeric: "tabular-nums",
          fontSize: isNarrow ? 11 : 12
        }),
        Plot.ruleY([0], { stroke: "currentColor", strokeOpacity: 0.5 })
      ]
    });

    const container = document.getElementById("chart-net-imports");
    container.innerHTML = "";
    container.append(chart);
  }

  render();
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 150);
  });
</script>
{% endraw %}
