{% raw %}
<style>
  .chart-eu-comparison {
    margin: 1.5rem 0;
    color: var(--text-color, currentColor);
  }
  .chart-eu-comparison figure {
    margin: 0;
  }
  .chart-eu-comparison svg {
    max-width: 100%;
    height: auto;
    background: transparent;
  }
  .chart-eu-comparison .caption {
    font-size: 0.8rem;
    opacity: 0.6;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
  .chart-eu-comparison .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem 1.1rem;
    margin: 0.25rem 0 0.6rem;
    font-size: 0.8rem;
    opacity: 0.85;
  }
  .chart-eu-comparison .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .chart-eu-comparison .legend-swatch {
    width: 14px;
    height: 10px;
    border-radius: 2px;
  }
  .chart-eu-comparison .legend-rule {
    width: 18px;
    height: 0;
    border-top: 2px dashed #f4a261;
  }
</style>

<div class="chart-eu-comparison">
  <div class="legend">
    <div class="legend-item">
      <span class="legend-swatch" style="background:#d97b66"></span>
      <span>Germany</span>
    </div>
    <div class="legend-item">
      <span class="legend-swatch" style="background:#6c7a89"></span>
      <span>Other EU</span>
    </div>
    <div class="legend-item">
      <span class="legend-swatch" style="background:#6c7a89; opacity:0.45"></span>
      <span>Reference (non-EU)</span>
    </div>
    <div class="legend-item">
      <span class="legend-rule"></span>
      <span>EU-27 average</span>
    </div>
  </div>

  <div id="chart-eu-comparison"></div>
</div>

<script type="module">
  const Plot = await import("https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.17/+esm");

  const data = [
    { country: "Ireland",  price: 40.42, group: "eu" },
    { country: "Germany",  price: 38.69, group: "de" },
    { country: "Denmark",  price: 33.12, group: "eu" },
    { country: "France*",  price: 25.50, group: "eu" },
    { country: "United States",  price: 17.00, group: "ref" },
    { country: "Hungary",  price: 10.82, group: "eu" }
  ];

  const EU_AVG = 28.96;

  function colorFor(group) {
    if (group === "de") return "#d97b66";
    if (group === "ref") return "#6c7a89";
    return "#6c7a89";
  }

  function opacityFor(group) {
    return group === "ref" ? 0.45 : 1;
  }

  function render() {
    const isNarrow = window.innerWidth < 600;
    const chart = Plot.plot({
      marginLeft: isNarrow ? 100 : 130,
      marginRight: 60,
      marginTop: 34,
      marginBottom: 36,
      height: 280,
      style: {
        background: "transparent",
        color: "currentColor",
        fontFamily: "inherit",
        fontSize: isNarrow ? "11px" : "13px"
      },
      x: {
        label: "ct / kWh",
        labelAnchor: "right",
        grid: true,
        nice: true,
        domain: [0, 45]
      },
      y: {
        label: null,
        domain: data.map(d => d.country)
      },
      marks: [
        Plot.barX(data, {
          x: "price",
          y: "country",
          fill: d => colorFor(d.group),
          fillOpacity: d => opacityFor(d.group)
        }),
        Plot.text(data, {
          x: "price",
          y: "country",
          text: d => d.price.toFixed(2),
          dx: 6,
          textAnchor: "start",
          fill: "currentColor",
          fillOpacity: 0.85,
          fontVariantNumeric: "tabular-nums"
        }),
        Plot.ruleX([0], { stroke: "currentColor", strokeOpacity: 0.3 }),
        Plot.ruleX([EU_AVG], {
          stroke: "#f4a261",
          strokeWidth: 2,
          strokeDasharray: "4 4"
        }),
        Plot.text([{ x: EU_AVG, label: `EU-27 avg  ${EU_AVG.toFixed(2)}` }], {
          x: "x",
          text: "label",
          frameAnchor: "top",
          dy: -20,
          dx: 4,
          textAnchor: "start",
          fill: "#f4a261",
          fontWeight: 600,
          fontSize: isNarrow ? 10 : 11
        })
      ]
    });

    const container = document.getElementById("chart-eu-comparison");
    container.innerHTML = "";
    container.append(chart);
  }

  render();
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 150);
  });
</script>
{% endraw %}
