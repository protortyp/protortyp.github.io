{% raw %}
<style>
  .chart-neg-hours {
    margin: 1.5rem 0;
    color: var(--text-color, currentColor);
  }
  .chart-neg-hours svg {
    max-width: 100%;
    height: auto;
    background: transparent;
  }
  .chart-neg-hours .caption {
    font-size: 0.8rem;
    opacity: 0.6;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
</style>

<div class="chart-neg-hours">
  <div id="chart-neg-hours"></div>
</div>

<script type="module">
  const Plot = await import("https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.17/+esm");

  const data = [
    { year: 2018, hours: 134 },
    { year: 2019, hours: 211 },
    { year: 2020, hours: 298 },
    { year: 2021, hours: 139 },
    { year: 2022, hours:  69 },
    { year: 2023, hours: 301 },
    { year: 2024, hours: 457 },
    { year: 2025, hours: 573 }
  ];

  function render() {
    const isNarrow = window.innerWidth < 600;
    const chart = Plot.plot({
      marginLeft: 50,
      marginRight: 30,
      marginTop: 32,
      marginBottom: 36,
      height: 300,
      style: {
        background: "transparent",
        color: "currentColor",
        fontFamily: "inherit",
        fontSize: isNarrow ? "11px" : "13px"
      },
      x: {
        label: null,
        tickFormat: d => String(d),
        ticks: data.map(d => d.year)
      },
      y: {
        label: "hours / year",
        labelAnchor: "top",
        grid: true,
        nice: true
      },
      marks: [
        Plot.barY(data, {
          x: "year",
          y: "hours",
          fill: d => d.year === 2025 ? "#7dd3c0" : "#6c7a89",
          fillOpacity: d => d.year === 2022 ? 0.5 : 1,
          inset: 6
        }),
        Plot.text(data, {
          x: "year",
          y: "hours",
          text: d => d.hours,
          dy: -8,
          fill: "currentColor",
          fillOpacity: 0.8,
          fontVariantNumeric: "tabular-nums",
          fontSize: isNarrow ? 10 : 11
        }),
        Plot.ruleY([0], { stroke: "currentColor", strokeOpacity: 0.3 })
      ]
    });

    const container = document.getElementById("chart-neg-hours");
    container.innerHTML = "";
    container.append(chart);
  }

  render();
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 150);
  });
</script>
{% endraw %}
