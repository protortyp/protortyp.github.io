{% raw %}
<style>
  .chart-residual-load {
    margin: 1.5rem 0;
    color: var(--text-color, currentColor);
  }
  .chart-residual-load svg {
    max-width: 100%;
    height: auto;
    background: transparent;
  }
  .chart-residual-load .panels {
    display: grid;
    gap: 1rem;
  }
  @media (min-width: 780px) {
    .chart-residual-load .panels {
      grid-template-columns: 1fr 1fr;
    }
  }
  .chart-residual-load .panel-title {
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0.9;
    margin: 0 0 0.4rem;
  }
  .chart-residual-load .panel-sub {
    font-size: 0.75rem;
    opacity: 0.6;
    margin: 0 0 0.4rem;
  }
  .chart-residual-load .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    margin: 0.25rem 0 0.6rem;
    font-size: 0.78rem;
    opacity: 0.9;
  }
  .chart-residual-load .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .chart-residual-load .legend-swatch {
    width: 14px;
    height: 10px;
    border-radius: 2px;
  }
  .chart-residual-load .legend-line {
    width: 18px;
    height: 0;
    border-top: 2px solid currentColor;
  }
  .chart-residual-load .caption {
    font-size: 0.8rem;
    opacity: 0.6;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
</style>

<div class="chart-residual-load">
  <div class="legend">
    <div class="legend-item">
      <span class="legend-line" style="border-top-color:#a8b5be"></span>
      <span>Total demand</span>
    </div>
    <div class="legend-item">
      <span class="legend-swatch" style="background:#7dd3c0"></span>
      <span>Wind + solar generation</span>
    </div>
    <div class="legend-item">
      <span class="legend-line" style="border-top-color:#d97b66"></span>
      <span>Residual load</span>
    </div>
  </div>

  <div class="panels">
    <div>
      <div class="panel-title">A windless winter week</div>
      <div class="panel-sub">Mid-January, cold, persistent low wind</div>
      <div id="chart-residual-winter"></div>
    </div>
    <div>
      <div class="panel-title">A sunny summer week</div>
      <div class="panel-sub">Mid-July, clear days, moderate wind</div>
      <div id="chart-residual-summer"></div>
    </div>
  </div>

</div>

<script type="module">
  const Plot = await import("https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.17/+esm");

  /* Synthesise a representative hourly week (168 hours) */
  function buildWeek(kind) {
    const winter = kind === "winter";
    const hours = [];
    for (let h = 0; h < 168; h++) {
      const hod = h % 24;
      const dow = Math.floor(h / 24);
      const weekendFactor = (dow >= 5) ? 0.92 : 1.0;

      /* Demand: bimodal daily, weekly modulation */
      const morning = 14 * Math.exp(-((hod - 8) ** 2) / 8);
      const evening = 18 * Math.exp(-((hod - 19) ** 2) / 12);
      const trough  = -8 * Math.exp(-((hod - 4) ** 2) / 6);
      const baseDemand = winter ? 50 : 38;
      const demand = weekendFactor * (baseDemand + morning + evening + trough);

      /* Solar: parabolic during daylight */
      let solar = 0;
      const sunUp = winter ? (hod >= 8 && hod <= 17) : (hod >= 5 && hod <= 21);
      if (sunUp) {
        const peak = winter ? 6 : 44;
        const center = 12.5;
        const width = winter ? 4 : 7.5;
        const factor = Math.max(0, 1 - ((hod - center) / width) ** 2);
        const cloud = 0.88 + 0.12 * Math.sin(h * 0.7 + dow);
        solar = peak * factor * cloud;
      }

      /* Wind: smooth pseudo-random noise */
      let wind;
      if (winter) {
        wind = 4 + 1.6 * Math.sin(h / 17) + 1.2 * Math.sin(h / 31);
        wind = Math.max(1.5, wind);
      } else {
        wind = 13 + 6 * Math.sin(h / 11) + 3 * Math.sin(h / 23);
        wind = Math.max(3, wind);
      }

      const renewables = solar + wind;
      const residual = demand - renewables;

      hours.push({ h, demand, renewables, residual, solar, wind });
    }
    return hours;
  }

  const winter = buildWeek("winter");
  const summer = buildWeek("summer");

  function panel(target, data, isNarrow) {
    const chart = Plot.plot({
      marginLeft: 44,
      marginRight: 16,
      marginTop: 28,
      marginBottom: 32,
      height: 260,
      style: {
        background: "transparent",
        color: "currentColor",
        fontFamily: "inherit",
        fontSize: isNarrow ? "10px" : "12px"
      },
      x: {
        label: "day of week",
        labelAnchor: "right",
        domain: [0, 168],
        ticks: [0, 24, 48, 72, 96, 120, 144, 168],
        tickFormat: d => ["Mon","Tue","Wed","Thu","Fri","Sat","Sun",""][d / 24]
      },
      y: {
        label: "GW",
        labelAnchor: "top",
        grid: true,
        domain: [-10, 85]
      },
      marks: [
        Plot.ruleY([0], { stroke: "currentColor", strokeOpacity: 0.45 }),
        Plot.areaY(data, {
          x: "h",
          y: "renewables",
          fill: "#7dd3c0",
          fillOpacity: 0.35,
          curve: "basis"
        }),
        Plot.lineY(data, {
          x: "h",
          y: "demand",
          stroke: "#a8b5be",
          strokeWidth: 1.6,
          curve: "basis"
        }),
        Plot.lineY(data, {
          x: "h",
          y: "residual",
          stroke: "#d97b66",
          strokeWidth: 2,
          curve: "basis"
        })
      ]
    });
    const container = document.getElementById(target);
    container.innerHTML = "";
    container.append(chart);
  }

  function render() {
    const isNarrow = window.innerWidth < 600;
    panel("chart-residual-winter", winter, isNarrow);
    panel("chart-residual-summer", summer, isNarrow);
  }

  render();
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 150);
  });
</script>
{% endraw %}
